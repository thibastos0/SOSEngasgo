spring.application.name=SOSEngasgo

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# conexão com o Mongodb Nuvem
spring.data.mongodb.uri=${MONGODB_URI}

# Configurações do Telegram Bot
telegram.bot-token=${TELEGRAM_BOT_TOKEN}
telegram.chat-id-group=${CHAT_ID_TELEGRAM_GROUP}
telegram.chat-id-user=${CHAT_ID_TELEGRAM}
telegram.webhook-url=${TELEGRAM_WEBHOOK_URL}

# ver comandos shell em: https://www.mongodb.com/pt-br/docs/mongodb-shell/
# rodar banco com mongo-start, encerrar com mongo-stop e shell em mongo-cli
# conexão com o MongoDB local
# spring.data.mongodb.uri= mongodb://localhost:27017/SOSEngasgo